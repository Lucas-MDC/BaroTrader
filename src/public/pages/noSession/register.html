<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/static/shared/css/style.css">
    <script type="module" src="/public/static/assets/js/register.js" defer></script>

    <title>Register</title>
</head>
<body>
    <header>
        <h1>Register</h1>
        <div class="header-right">
            <a href="/">Back</a>
        </div>  
    </header>

    <main>
        <div class="container">
            <section id="register-area">
                <form id="register-form">
                    <input type="text" id="username-email" name="username" placeholder="Username" autocomplete="username" required pattern="^[a-z0-9](?:[a-z0-9._-]{1,30}[a-z0-9])?$" minlength="1" maxlength="32" title="Use 1-32 characters: lowercase letters, numbers, dot, underscore, or hyphen.">
                    <input type="password" id="password-register" name="password" placeholder="Password" autocomplete="new-password" required pattern="^(?=.*[A-Za-z])(?=.*\d)[\x21-\x7E]{8,64}$" minlength="8" maxlength="64" title="Use 8-64 characters with at least one letter and one number.">
                    <button type="submit" id="register-button">Register</button>
                    <p id="register-feedback" aria-live="polite"></p>
                </form>
            </section>
        </div>
    </main>
    
</body>
</html>
