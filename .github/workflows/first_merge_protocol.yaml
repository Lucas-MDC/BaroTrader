name: CI

on:
  pull_request_target:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      HOST: localhost
      PORT: 5432
      BAROTRADER_DB_ADMIN_DBNAME: postgres
      BAROTRADER_DB_ADMIN_USER: postgres
      BAROTRADER_DB_ADMIN_PASS: postgres
      HASH_PEPPER: ci-pepper
      REGISTER_MIN_DELAY_MS: 0
      KEEP_DB: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
