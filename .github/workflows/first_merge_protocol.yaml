name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ vars.TEST_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          POSTGRES_DB: ${{ vars.TEST_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ vars.TEST_USER }} -d ${{ vars.TEST_DB }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: ${{ vars.APP_ENV }}
      APP_HOST: ${{ vars.APP_HOST }}
      APP_PORT: ${{ vars.APP_PORT }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_BASE_ROLE: ${{ vars.DB_BASE_ROLE }}
      HASH_PEPPER: ${{ secrets.HASH_PEPPER }}
      REGISTER_MIN_DELAY_MS: ${{ vars.REGISTER_MIN_DELAY_MS }}
      TEST_DB: ${{ vars.TEST_DB }}
      TEST_USER: ${{ vars.TEST_USER }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      RUNTIME_DB: ${{ vars.RUNTIME_DB }}
      RUNTIME_USER: ${{ vars.RUNTIME_USER }}
      RUNTIME_PASSWORD: ${{ secrets.RUNTIME_PASSWORD }}
      MIGRATION_DB: ${{ vars.MIGRATION_DB }}
      MIGRATION_USER: ${{ vars.MIGRATION_USER }}
      MIGRATION_PASSWORD: ${{ secrets.MIGRATION_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate test environment
        run: npm run validate:env:test

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
