services:
  db:
    environment:
      POSTGRES_DB: ${BAROTRADER_DB_ADMIN_DB:?Set BAROTRADER_DB_ADMIN_DB}
      POSTGRES_USER: ${BAROTRADER_DB_ADMIN_USER:?Set BAROTRADER_DB_ADMIN_USER}
      POSTGRES_PASSWORD: ${BAROTRADER_DB_ADMIN_PASSWORD:?Set BAROTRADER_DB_ADMIN_PASSWORD}
      RUNTIME_DB: ${RUNTIME_DB:?Set RUNTIME_DB}
      RUNTIME_USER: ${RUNTIME_USER:?Set RUNTIME_USER}
      RUNTIME_PASSWORD: ${RUNTIME_PASSWORD:?Set RUNTIME_PASSWORD}
      MIGRATION_DB: ${MIGRATION_DB:?Set MIGRATION_DB}
      MIGRATION_USER: ${MIGRATION_USER:?Set MIGRATION_USER}
      MIGRATION_PASSWORD: ${MIGRATION_PASSWORD:?Set MIGRATION_PASSWORD}
    ports:
      - "5432:5432"

  migrate:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV}
      APP_HOST: ${APP_HOST:?Set APP_HOST}
      APP_PORT: ${APP_PORT:?Set APP_PORT}
      DB_HOST: ${DB_HOST:?Set DB_HOST}
      DB_PORT: ${DB_PORT:?Set DB_PORT}
      DB_BASE_ROLE: ${DB_BASE_ROLE:?Set DB_BASE_ROLE}
      BAROTRADER_DB_ADMIN_DB: ${BAROTRADER_DB_ADMIN_DB:?Set BAROTRADER_DB_ADMIN_DB}
      BAROTRADER_DB_ADMIN_USER: ${BAROTRADER_DB_ADMIN_USER:?Set BAROTRADER_DB_ADMIN_USER}
      BAROTRADER_DB_ADMIN_PASSWORD: ${BAROTRADER_DB_ADMIN_PASSWORD:?Set BAROTRADER_DB_ADMIN_PASSWORD}
      MIGRATION_DB: ${MIGRATION_DB:?Set MIGRATION_DB}
      MIGRATION_USER: ${MIGRATION_USER:?Set MIGRATION_USER}
      MIGRATION_PASSWORD: ${MIGRATION_PASSWORD:?Set MIGRATION_PASSWORD}
      RUNTIME_DB: ${RUNTIME_DB:?Set RUNTIME_DB}
      RUNTIME_USER: ${RUNTIME_USER:?Set RUNTIME_USER}
      RUNTIME_PASSWORD: ${RUNTIME_PASSWORD:?Set RUNTIME_PASSWORD}
      REGISTER_MIN_DELAY_MS: ${REGISTER_MIN_DELAY_MS:?Set REGISTER_MIN_DELAY_MS}
      HASH_PEPPER: ${HASH_PEPPER:?Set HASH_PEPPER}
    command:
      [
        "sh",
        "-lc",
        "npm run db:setup && npm run db:migrate -- up"
      ]

  app:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      APP_ENV: ${APP_ENV:?Set APP_ENV}
      APP_HOST: ${APP_HOST:?Set APP_HOST}
      APP_PORT: ${APP_PORT:?Set APP_PORT}
      DB_HOST: ${DB_HOST:?Set DB_HOST}
      DB_PORT: ${DB_PORT:?Set DB_PORT}
      RUNTIME_DB: ${RUNTIME_DB:?Set RUNTIME_DB}
      RUNTIME_USER: ${RUNTIME_USER:?Set RUNTIME_USER}
      RUNTIME_PASSWORD: ${RUNTIME_PASSWORD:?Set RUNTIME_PASSWORD}
      REGISTER_MIN_DELAY_MS: ${REGISTER_MIN_DELAY_MS:?Set REGISTER_MIN_DELAY_MS}
      HASH_PEPPER: ${HASH_PEPPER:?Set HASH_PEPPER}
    ports:
      - "${APP_PORT:?Set APP_PORT}:${APP_PORT:?Set APP_PORT}"
    command: ["npm", "run", "dev"]
