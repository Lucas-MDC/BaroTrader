services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${TEST_USER:?Set TEST_USER}
      POSTGRES_PASSWORD: ${TEST_PASSWORD:?Set TEST_PASSWORD}
      POSTGRES_DB: ${TEST_DB:?Set TEST_DB}
    ports:
      - "55432:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  pgdata_test:
    name: barotrader_pgdata_test
