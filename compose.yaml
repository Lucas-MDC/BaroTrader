services:
  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build:
      context: .
    working_dir: /app
    init: true
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
    working_dir: /app
    init: true
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
    name: pgdata
  app_node_modules:
